<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMZ LIAN — Playlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-prefix">AMZ</span><span class="brand-suffix">LIAN</span>
        <span class="brand-dot">●</span>
        <span class="brand-label">Playlist</span>
      </div>
      <div class="header-controls">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.75" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" type="text" class="search-input" placeholder="Cari lagu resmi atau lagumu…" autocomplete="off" />
          <button id="clearSearch" class="clear-btn" aria-label="Clear search" hidden>✕</button>
        </div>
        <div class="header-actions">
          <button id="sortBtn" class="btn-icon" title="Urutkan">
            <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M5 10h10M7 15h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="importBtn" class="btn-icon" title="Import Playlist">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 13V3m0 10l-3-3m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="exportBtn" class="btn-icon" title="Export Playlist">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 7v10m0-10l-3 3m3-3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="addBtn" class="btn-primary">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Tambah Lagu
          </button>
        </div>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <div class="filter-inner">
        <div class="tag-chips" id="tagChips">
          <button class="chip active" data-tag="">Semua</button>
        </div>
        <div class="sort-options" id="sortOptions" hidden>
          <button class="sort-opt active" data-sort="newest">Terbaru</button>
          <button class="sort-opt" data-sort="titleAZ">Judul A–Z</button>
          <button class="sort-opt" data-sort="artistAZ">Artis A–Z</button>
          <button class="sort-opt" data-sort="pinned">Favorit Dulu</button>
        </div>
      </div>
    </div>
  </header>

  <main class="playlist-grid" id="playlistGrid"></main>

  <div class="empty-state" id="emptyState" hidden>
    <div class="empty-icon">🎵</div>
    <p class="empty-title">Playlist kosong</p>
    <p class="empty-sub">Tambahkan lagu pertamamu!</p>
    <button class="btn-primary" onclick="document.getElementById('addBtn').click()">+ Tambah Lagu</button>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none" />

  <div class="modal-overlay" id="detailOverlay" hidden>
    <div class="modal modal-detail" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <button class="modal-close" id="detailClose" aria-label="Tutup">✕</button>
      <div class="detail-cover-wrap">
        <img id="detailCover" src="" alt="" class="detail-cover" />
      </div>
      <div class="detail-body">
        <div class="detail-meta">
          <h2 id="detailTitle" class="detail-title"></h2>
          <p id="detailArtist" class="detail-artist"></p>
          <div id="detailTags" class="detail-tags"></div>
        </div>
        <div class="detail-platforms" id="detailPlatforms"></div>
        
        <div class="detail-actions">
          <button class="btn-ghost" id="detailEditBtn">✏️ Edit</button>
          <button class="btn-danger" id="detailDeleteBtn">🗑 Hapus</button>
          <button class="btn-pin" id="detailPinBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="formOverlay" hidden>
    <div class="modal modal-form" id="formModal" role="dialog" aria-modal="true" aria-labelledby="formTitle">
      <button class="modal-close" id="formClose" aria-label="Tutup">✕</button>
      <h2 id="formTitle" class="form-title">Tambah Lagu</h2>

      <div class="form-body">
        <div class="form-row">
          <label class="form-label" for="fTitle">Judul Lagu <span class="req">*</span></label>
          <input id="fTitle" type="text" class="form-input" placeholder="e.g. Blinding Lights" />
        </div>
        <div class="form-row">
          <label class="form-label" for="fArtist">Artis <span class="req">*</span></label>
          <input id="fArtist" type="text" class="form-input" placeholder="e.g. The Weeknd" />
        </div>
        <div class="form-row">
          <label class="form-label" for="fCover">URL Cover / Upload Gambar</label>
          <div class="cover-input-group">
            <input id="fCover" type="text" class="form-input" placeholder="https://..." />
            <label class="btn-ghost upload-label" title="Upload gambar lokal">
              📁
              <input type="file" id="fCoverFile" accept="image/*" style="display:none" />
            </label>
          </div>
          <div class="cover-preview-wrap">
            <img id="coverPreview" src="" alt="" class="cover-preview" hidden />
          </div>
        </div>
        <div class="form-row">
          <label class="form-label" for="fTags">Tags <span class="form-hint">(pisahkan dengan koma)</span></label>
          <input id="fTags" type="text" class="form-input" placeholder="pop, favorit, lo-fi" />
        </div>

        <div class="platform-section">
          <p class="form-label">Link Platform <span class="req">*</span> <span class="form-hint">(min. 1 diisi)</span></p>
          <div class="platform-inputs">
            <div class="platform-input-row">
              <span class="platform-icon-label">YouTube</span>
              <input id="fYoutube" type="url" class="form-input" placeholder="https://youtube.com/watch?v=…" />
            </div>
            <div class="platform-input-row">
              <span class="platform-icon-label">YouTube Music</span>
              <input id="fYoutubeMusic" type="url" class="form-input" placeholder="https://music.youtube.com/watch?v=…" />
            </div>
            <div class="platform-input-row">
              <span class="platform-icon-label">Spotify</span>
              <input id="fSpotify" type="url" class="form-input" placeholder="https://open.spotify.com/track/…" />
            </div>
          </div>
        </div>

        <div class="form-error" id="formError" hidden></div>
        <div class="form-footer">
          <button class="btn-ghost" id="formCancelBtn">Batal</button>
          <button class="btn-primary" id="formSaveBtn">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <div id="miniPlayer" class="mini-player" hidden>
    <div class="player-info">
      <div id="playerTitle" style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Judul</div>
      <div id="playerArtist" style="font-size:12px; color:var(--subtle); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Artis</div>
    </div>
    <div id="playerFrameContainer" class="player-frame"></div>
    <button id="closePlayer" class="btn-close-player">✕</button>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="js/script.js"></script>
</body>
</html>
