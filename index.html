<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMZ LIAN — Playlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-prefix">AMZ</span><span class="brand-suffix">LIAN</span>
        <span class="brand-dot">●</span>
        <span class="brand-label">Playlist</span>
      </div>
      <div class="header-controls">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.75" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" type="text" class="search-input" placeholder="Cari lagu resmi atau lagumu…" autocomplete="off" />
          <button id="clearSearch" class="clear-btn" aria-label="Clear search" hidden>✕</button>
        </div>
        <div class="header-actions">
          <button id="sortBtn" class="btn-icon" title="Urutkan">
            <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M5 10h10M7 15h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="importBtn" class="btn-icon" title="Import Playlist">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 13V3m0 10l-3-3m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="exportBtn" class="btn-icon" title="Export Playlist">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 7v10m0-10l-3 3m3-3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="addBtn" class="btn-primary">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Tambah Lagu
          </button>
        </div>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <div class="filter-inner">
        <div class="tag-chips" id="tagChips">
          <button class="chip active" data-tag="">Semua</button>
        </div>
        <div class="sort-options" id="sortOptions" hidden>
          <button class="sort-opt active" data-sort="newest">Terbaru</button>
          <button class="sort-opt" data-sort="titleAZ">Judul A–Z</button>
          <button class="sort-opt" data-sort="artistAZ">Artis A–Z</button>
          <button class="sort-opt" data-sort="pinned">Favorit Dulu</button>
        </div>
      </div>
    </div>
  </header>

  <main class="playlist-grid" id="playlistGrid"></main>

  <div class="empty-state" id="emptyState" hidden>
    <div class="empty-icon">🎵</div>
    <p class="empty-title">Playlist kosong</p>
    <p class="empty-sub">Tambahkan lagu pertamamu!</p>
    <button class="btn-primary" onclick="document.getElementById('addBtn').click()">+ Tambah Lagu</button>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none" />

  <div class="modal-overlay" id="detailOverlay" hidden>
    <div class="modal modal-detail" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <button class="modal-close" id="detailClose" aria-label="Tutup">✕</button>
      <div class="detail-cover-wrap">
        <img id="detailCover" src="" alt="" class="detail-cover" />
      </div>
      <div class="detail-body">
        <div class="detail-meta">
          <h2 id="detailTitle" class="detail-title"></h2>
          <p id="detailArtist" class="detail-artist"></p>
          <div id="detailTags" class="detail-tags"></div>
        </div>
        <div class="detail-platforms" id="detailPlatforms"></div>
        
        <div class="detail-actions">
          <button class="btn-ghost" id="detailEditBtn">✏️ Edit</button>
          <button class="btn-danger" id="detailDeleteBtn">🗑 Hapus</button>
          <button class="btn-pin" id="detailPinBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="formOverlay" hidden>
    <div class="modal modal-form" id="formModal" role="dialog" aria-modal="true" aria-labelledby="formTitle">
      <button class="modal-close" id="formClose" aria-label="Tutup">✕</button>
      <h2 id="formTitle" class="form-title">Tambah Lagu</h2>
      <div class="form-body">
        <div class="form-row" style="margin-bottom: 15px; border-bottom: 1px dashed var(--border); padding-bottom: 15px;">
          <label class="form-label" style="color:var(--accent-2); display:flex; align-items:center; gap:4px;">⚡ Cari Otomatis dari Internet <span class="form-hint">(Klik untuk isi otomatis)</span></label>
          <input id="fAutoSearch" type="text" class="form-input" style="border-color:var(--accent-2)" placeholder="Ketik judul lagu / artis di sini untuk mengisi data..." autocomplete="off" />
          <div id="fAutoSearchResults" style="display:flex; flex-direction:column; gap:6px; margin-top:8px; max-height:180px; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:8px;"></div>
        </div>
        ```
      <div class="form-body">
        <div class="form-row">
          <label class="form-label" for="fTitle">Judul Lagu <span class="req">*</span></label>
          <input id="fTitle" type="text" class="form-input" placeholder="e.g. Blinding Lights" />
        </div>
        <div class="form-row">
          <label class="form-label" for="fArtist">Artis <span class="req">*</span></label>
          <input id="fArtist" type="text" class="form-input" placeholder="e.g. The Weeknd" />
        </div>
        <div class="form-row">
          <label class="form-label" for="fCover">URL Cover / Upload Gambar</label>
          <div class="cover-input-group">
            <input id="fCover" type="text" class="form-input" placeholder="https://..." />
            <label class="btn-ghost upload-label" title="Upload gambar lokal">
              📁
              <input type="file" id="fCoverFile" accept="image/*" style="display:none" />
            </label>
          </div>
          <div class="cover-preview-wrap">
            <img id="coverPreview" src="" alt="" class="cover-preview" hidden />
          </div>
        </div>
        <div class="form-row">
          <label class="form-label" for="fTags">Tags <span class="form-hint">(pisahkan dengan koma)</span></label>
          <input id="fTags" type="text" class="form-input" placeholder="pop, favorit, lo-fi" />
        </div>

                <div class="platform-section">
          <p class="form-label">Link Platform <span class="req">*</span> <span class="form-hint">(min. 1 diisi)</span></p>
          <div class="platform-inputs">
            <div class="platform-input-row">
              <span class="platform-icon-label">
                <svg viewBox="0 0 24 24" class="plat-icon" fill="#FF0000"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 00.5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 002.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 002.1-2.1c.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
                YouTube
              </span>
              <input id="fYoutube" type="url" class="form-input" placeholder="https://youtube.com/watch?v=…" />
            </div>
            <div class="platform-input-row">
              <span class="platform-icon-label">
                <svg viewBox="0 0 24 24" class="plat-icon" fill="#FF0000"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm-9-5.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zm-.5 2.5h1v4.5l3.5 2-.5.87-4-2.37V9z" fill="#fff"/></svg>
                YouTube Music
              </span>
              <input id="fYoutubeMusic" type="url" class="form-input" placeholder="https://music.youtube.com/watch?v=…" />
            </div>
            <div class="platform-input-row">
              <span class="platform-icon-label">
                <svg viewBox="0 0 24 24" class="plat-icon" fill="#1DB954"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.5 17.3c-.2.3-.6.4-.9.2-2.6-1.6-5.8-1.9-9.6-1.1-.4.1-.7-.2-.8-.6-.1-.4.2-.7.6-.8 4.2-.9 7.7-.5 10.6 1.3.3.3.4.7.1 1zm1.5-3.3c-.3.4-.8.5-1.2.2-2.9-1.8-7.4-2.3-10.9-1.3-.4.1-.9-.1-1-.5-.1-.4.1-.9.5-1 4-.1 9 .5 12.3 2.5.4.1.5.7.3 1.1zm.1-3.4c-3.5-2.1-9.4-2.3-12.7-1.3-.5.2-1-.1-1.2-.6-.2-.5.1-1 .6-1.2 3.9-1.2 10.3-.9 14.4 1.5.5.3.6.9.4 1.4-.3.5-.9.6-1.5.2z"/></svg>
                Spotify
              </span>
              <input id="fSpotify" type="url" class="form-input" placeholder="https://open.spotify.com/track/…" />
            </div>
            <div class="platform-input-row">
              <span class="platform-icon-label">
                <svg viewBox="0 0 24 24" class="plat-icon" fill="#FC3C44"><path d="M12 0C5.374 0 0 5.373 0 12s5.374 12 12 12 12-5.373 12-12S18.626 0 12 0zm5.5 17.5h-2.833v-3.667c0-2-.834-2.5-1.917-2.5-1.083 0-1.75.833-1.75 2.5V17.5H8.167V10.5H11v1.25c.333-.667 1.25-1.5 2.75-1.5 1.833 0 3.75 1.083 3.75 4.25V17.5zm-9.334 0H5.333V10.5h2.833V17.5zm-1.416-8.334a1.583 1.583 0 110-3.166 1.583 1.583 0 010 3.166z"/></svg>
                Apple Music
              </span>
              <input id="fAppleMusic" type="url" class="form-input" placeholder="https://music.apple.com/…" />
            </div>
            <div class="platform-input-row">
              <span class="platform-icon-label">
                <svg viewBox="0 0 24 24" class="plat-icon" fill="#FF5500"><path d="M1.18 17.36c0 .75.61 1.36 1.37 1.36a1.37 1.37 0 001.37-1.36v-5.94a1.37 1.37 0 00-1.37-1.36 1.37 1.37 0 00-1.37 1.36v5.94zm18.1-7.1a7.5 7.5 0 00-6.24-3.35c-.44 0-.88.04-1.3.12V4.76a1.37 1.37 0 00-2.74 0v12.6c0 .75.61 1.36 1.37 1.36h.02c.16 0 .32-.03.48-.08a7.5 7.5 0 003.41.82c4.14 0 7.5-3.35 7.5-7.5a7.5 7.5 0 00-2.5-5.7z"/></svg>
                SoundCloud
              </span>
              <input id="fSoundcloud" type="url" class="form-input" placeholder="https://soundcloud.com/…" />
            </div>
          </div>
        </div>

        <div class="form-error" id="formError" hidden></div>
        <div class="form-footer">
          <button class="btn-ghost" id="formCancelBtn">Batal</button>
          <button class="btn-primary" id="formSaveBtn">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <div id="miniPlayer" class="mini-player" style="position: fixed; bottom: 0; left: 0; right: 0; background: #111622; border-top: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 999; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);" hidden>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div style="min-width: 0; flex: 1;">
        <p id="playerTitle" style="font-weight: 600; color: #fff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px;">Judul Lagu</p>
        <p id="playerArtist" style="font-size: 12px; color: var(--subtle); margin: 2px 0 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nama Artis</p>
      </div>
      <button id="closePlayer" style="background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 5px;">&times;</button>
    </div>

    <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
      <span id="currentTime" style="font-size: 11px; color: var(--muted); font-family: monospace;">0:00</span>
      <input id="playerProgress" type="range" value="0" min="0" max="100" style="flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer;" />
      <span id="durationTime" style="font-size: 11px; color: var(--muted); font-family: monospace;">0:00</span>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 5px;">
      <button id="btnShuffle" style="background:transparent; border:none; color:var(--muted); font-size:16px; cursor:pointer; transition:0.2s;" title="Acak Lagu">🔀</button>
      
      <button id="btnPrev" style="background:transparent; border:none; color:#fff; font-size:18px; cursor:pointer;" title="Lagu Sebelumnya">⏮</button>
      
      <button id="btnPlayPause" style="background:var(--accent); border:none; color:#fff; width:40px; height:40px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(124,106,247,0.3);" title="Play/Pause">⏸</button>
      
      <button id="btnNext" style="background:transparent; border:none; color:#fff; font-size:18px; cursor:pointer;" title="Lagu Selanjutnya">⏭</button>
      
      <button id="btnRepeat" style="background:transparent; border:none; color:var(--muted); font-size:16px; cursor:pointer; transition:0.2s;" title="Ulangi Lagu">🔁</button>
    </div>

    <audio id="nexusAudioEngine" style="display:none;"></audio>
  </div>


  <div class="toast" id="toast" hidden></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script src="js/script.js"></script>
</body>
</html>


  <script src="js/script.js"></script>
</body>
</html>
